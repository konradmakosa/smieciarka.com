<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Śmieciarka.com - Harmonogram wywozu odpadów Warszawa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .canvas {
      position: absolute;
      width: 1920px;
      height: 1020px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background-image: url("https://raw.githubusercontent.com/konradmakosa/smieciarka.com/main/public/tlo_smieciarka_m.jpg");
      background-size: 1920px 1020px;
      background-repeat: no-repeat;
    }
    .content-box {
      position: absolute;
      width: 690px;
      height: 385px;
      left: 605px;
      top: 275px;
      background: transparent;
      padding: 16px;
      box-sizing: border-box;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="canvas" id="canvas">
      <div class="content-box" id="cbox">

        <!-- Wyszukiwarka -->
        <div class="bg-white/90 rounded-2xl shadow-xl p-5 mb-3 border border-white/20">
            <label class="block text-sm font-medium text-gray-900 mb-2">Wpisz swój adres</label>
            <div class="flex gap-2">
                <input
                    type="text"
                    id="addressInput"
                    placeholder="np. Platnicza 65"
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none text-gray-900"
                >
                <button
                    onclick="searchAddress()"
                    id="searchBtn"
                    class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl transition-colors"
                >
                    Szukaj
                </button>
            </div>
            <p class="text-xs text-gray-900 mt-2">Format: ulica numer (np. &quot;Marszałkowska 100&quot;)</p>
            <div id="loading" class="hidden mt-3 text-center text-gray-500 text-sm">
                <div class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-green-600"></div>
                Wyszukiwanie...
            </div>
            <div id="error" class="hidden mt-3 p-2 bg-red-50 text-red-700 rounded-lg text-sm"></div>
        </div>

        <!-- Wynik -->
        <div id="result" class="hidden bg-white/90 rounded-2xl shadow-lg p-4 mb-3">
            <div class="text-center">
                <p class="text-gray-900 mb-3 text-sm">Adres: <span id="foundAddress" class="font-medium"></span></p>
                <div class="bg-gray-50 rounded-xl p-2 mb-3">
                    <code id="calendarUrl" class="text-xs text-gray-900 break-all"></code>
                </div>
                <button
                    onclick="downloadCalendar()"
                    class="w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Pobierz plik .ics
                </button>
                <p id="downloadMsg" class="hidden mt-2 text-green-600 text-sm font-medium">Pobieranie rozpoczęte! ✅</p>
            </div>
        </div>

        <!-- Buy Me A Coffee -->
        <div class="text-center">
            <a href="https://www.buymeacoffee.com/smieciarka" target="_blank"
               class="inline-flex items-center gap-2 px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-semibold rounded-xl transition-colors text-sm">
                ☕ Postaw mi kawę
            </a>
            <p class="text-xs text-gray-900 mt-1">Serwis jest darmowy, ale kawa motywuje do rozwoju! 😊</p>
        </div>

        <!-- Footer -->
        <div class="text-center mt-3 text-xs text-gray-900">
            <p>Dane pobierane z <a href="https://warszawa19115.pl" class="text-green-600 hover:underline" target="_blank">warszawa19115.pl</a></p>
            <p class="mt-1">Cache odświeżany co 7 dni</p>
        </div>

      </div>
    </div>
  </div>

  <script>
    const addressInput = document.getElementById('addressInput');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const foundAddress = document.getElementById('foundAddress');
    const calendarUrl = document.getElementById('calendarUrl');

    addressInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchAddress();
    });

    async function searchAddress() {
      const query = addressInput.value.trim();
      if (!query || query.length < 3) {
        showError('Wpisz co najmniej 3 znaki');
        return;
      }
      loading.classList.remove('hidden');
      error.classList.add('hidden');
      result.classList.add('hidden');
      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'Nie znaleziono adresu');
        if (data.results && data.results.length > 0) {
          const item = data.results[0];
          showResult(item.address, item.url);
        } else {
          throw new Error('Nie znaleziono adresu');
        }
      } catch (err) {
        showError(err.message || 'Wystąpił błąd. Spróbuj ponownie.');
      } finally {
        loading.classList.add('hidden');
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.remove('hidden');
    }

    function showResult(address, url) {
      foundAddress.textContent = address;
      const fullUrl = window.location.origin + url;
      calendarUrl.textContent = fullUrl;
      calendarUrl.dataset.url = fullUrl;
      result.classList.remove('hidden');
      document.getElementById('downloadMsg').classList.add('hidden');
    }

    function downloadCalendar() {
      const url = calendarUrl.dataset.url;
      const a = document.createElement('a');
      a.href = url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      document.getElementById('downloadMsg').classList.remove('hidden');
    }
  </script>

</body>
</html>
